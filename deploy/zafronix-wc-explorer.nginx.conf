# nginx config snippet for the wc-explorer's location block on
# /etc/nginx/conf.d/api.zafronix.com.conf.
#
# Companion file: /etc/nginx/conf.d/00-zafronix-limits.conf (rate-
# limit zones declared at the http context). The 00- prefix forces
# early sort so this vhost can reference the zones in limit_req.
#
# ─── /etc/nginx/conf.d/00-zafronix-limits.conf ──────────────────────
#
#   limit_req_zone $binary_remote_addr zone=wc_explorer_per_ip:10m rate=5r/s;
#   limit_req_zone $binary_remote_addr zone=track_visit_per_ip:10m rate=2r/s;
#   limit_req_log_level warn;
#   limit_req_status 429;
#
# Rate history (wc_explorer_per_ip):
#   30 r/min (orig) — meant to be "real users never come close"; was
#                     in fact tripping during normal demos. Each page
#                     render hits nginx ~5-10x (HTML + chunks + CSS +
#                     OG image + the SionoPollEmbed payload), so 3-5
#                     refreshes blew the bucket.
#   5  r/s  (now)   — 300 r/min average, comfortably handles even
#                     rapid demo refreshes from a single IP while
#                     still bouncing real spam at the edge. Layered
#                     above wc-api in-process limits which still
#                     handle sustained patterns.
#
# Rate history (track_visit_per_ip):
#   10 r/min (orig) — too tight for the same reason
#   2  r/s  (now)   — beacon fires once per page view; 2/s handles
#                     dev/demo refresh sprees
#
# ─── /etc/nginx/conf.d/api.zafronix.com.conf ────────────────────────
# Inside the existing `server { ... listen 443 ... }` block,
# above the catch-all `location / { proxy_pass http://127.0.0.1:3200; }`:
#
#   # WC Explorer (sample dashboard, public). Mounted under /wc-explorer/
#   # — Next.js basePath routes everything under that prefix internally.
#   location /wc-explorer/ {
#     # Per-IP rate limit — 5 r/s average with burst of 50. Real
#     # demos and SPA navigation stay well under; sustained bot
#     # traffic (>5 r/s after the burst) gets 429.
#     limit_req zone=wc_explorer_per_ip burst=50 nodelay;
#     proxy_pass http://127.0.0.1:3400/wc-explorer/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection "upgrade";
#     proxy_read_timeout 60s;
#   }
#
#   # /track/visit beacon — anonymous, IP-rate-limited.
#   # 2/s average, burst 30. Layered below the in-process bucket in
#   # routes/track.ts (300/hr) — nginx catches the burst, app catches
#   # the sustained.
#   location /fifa/worldcup/v1/track/ {
#     limit_req zone=track_visit_per_ip burst=30 nodelay;
#     proxy_pass http://127.0.0.1:3200;
#     proxy_set_header Host $host;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#   }
#
#   # Bare /wc-explorer → /wc-explorer/ so Next's trailingSlash:true
#   # canonical matches what nginx forwards.
#   location = /wc-explorer {
#     return 308 /wc-explorer/;
#   }
#
# Notes:
#   - Next.js basePath: '/wc-explorer' means every URL the app emits
#     already includes the prefix, so no URL rewriting beyond proxy_pass.
#   - Underlying WC API stays at /fifa/worldcup/v1/* — this snippet
#     doesn't touch the existing API routes except for /track/.
#   - Layered defense: nginx catches bursts at the edge (cheap, no Node
#     touched), in-process middleware catches sustained patterns +
#     enforces per-visitor caps on internal-tier amplification (see
#     src/middleware/rate-limit.ts).
