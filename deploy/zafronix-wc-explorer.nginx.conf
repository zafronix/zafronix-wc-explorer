# Snippet for /etc/nginx/conf.d/api.zafronix.com.conf — adds the
# /wc-explorer location block to the api.zafronix.com vhost.
#
# Drop this *inside* the existing `server { ... listen 443 ... }` block,
# above the catch-all `location / { proxy_pass http://127.0.0.1:<api>; }`:
#
#   location /wc-explorer/ {
#     proxy_pass http://127.0.0.1:3400/wc-explorer/;
#     proxy_http_version 1.1;
#     proxy_set_header Host $host;
#     proxy_set_header X-Real-IP $remote_addr;
#     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto $scheme;
#     proxy_set_header Upgrade $http_upgrade;
#     proxy_set_header Connection "upgrade";
#     proxy_read_timeout 60s;
#   }
#
#   # Bare /wc-explorer → /wc-explorer/ so Next's trailingSlash:true
#   # canonical matches what nginx forwards.
#   location = /wc-explorer {
#     return 308 /wc-explorer/;
#   }
#
# Notes:
#   - Next.js basePath: '/wc-explorer' means every URL the app emits
#     already includes the prefix, so no URL rewriting beyond proxy_pass.
#   - Underlying WC API stays at /fifa/worldcup/v1/* — this snippet
#     doesn't touch the existing API routes.
